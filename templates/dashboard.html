<!DOCTYPE html>
<html>
<head>

<title>Rapid Labs Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

<style>

.main{
margin-left:220px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
font-size:16px;
color:#666;
}

.card p{
font-size:28px;
font-weight:bold;
margin-top:10px;
color:#0f3f7a;
}

</style>

</head>


<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Rapid Labs</h2>

<ul>
<li style="background:#0f3f7a;">Dashboard</li>
<li onclick="openLeads()">Leads</li>
<li onclick="openCollection()">Sample Collection</li>
<li onclick="openReports()">Reports</li>
<li onclick="openPayments()">Payments</li>
<li onclick="openStaff()">Staff</li>

</ul>

</div>



<!-- MAIN -->

<div class="main">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Leads</h3>
<p id="totalLeads">0</p>
</div>

<div class="card">
<h3>Today's Leads</h3>
<p id="todayLeads">0</p>
</div>

<div class="card">
<h3>Completed Tests</h3>
<p id="completedTests">0</p>
</div>

<div class="card">
<h3>Total Staff</h3>
<p id="totalStaff">0</p>
</div>

</div>

</div>



<script>

/* NAVIGATION */

function openLeads(){
window.location.href="/leads";
}

function openReports(){
window.location.href="/reports";
}

function openPayments(){
window.location.href="/payments"
}

function openStaff(){
window.location.href="/staff"
}

function openCollection(){
window.location.href="/sample-collection?role=admin";
}
/* LOAD DASHBOARD DATA */

async function loadDashboard(){

try{

const res = await fetch("/api/dashboard-stats");

const data = await res.json();

document.getElementById("totalLeads").innerText = data.total_leads;

document.getElementById("todayLeads").innerText = data.today_leads;

document.getElementById("completedTests").innerText = data.completed;

document.getElementById("totalStaff").innerText = data.staff;

}catch(err){

console.error("Dashboard load error",err);

}

}


/* LOAD WHEN PAGE OPENS */

loadDashboard();

</script>

</body>
</html>
