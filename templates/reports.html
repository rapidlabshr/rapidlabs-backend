<!DOCTYPE html>
<html>
<head>

<title>Rapid Labs - Reports</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.main{
margin-left:220px;
padding:30px;
}

h1{
margin-bottom:25px;
}

.table-container{
background:white;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:left;
border-bottom:1px solid #000000;
}

th{
background:#0f3f7a;
color:rgb(0, 0, 0);
}

tr:hover{
background:#f9fbff;
}

select{
padding:6px;
border-radius:4px;
border:1px solid #ccc;
}

.upload-btn{
background:#0f3f7a;
color:white;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
font-size:13px;
}

.upload-btn:hover{
background:#0c2f5c;
}

.file-input{
width:180px;
}

.download-btn{
color:#0f3f7a;
font-weight:bold;
text-decoration:none;
}

.download-btn:hover{
text-decoration:underline;
}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h2>Rapid Labs</h2>

<ul>
<li onclick="openDashboard()">Dashboard</li>
<li onclick="openLeads()">Leads</li>
<li>Sample Collection</li>
<li style="background:#0f3f7a;">Reports</li>
<li>Payments</li>
<li>Staff</li>
</ul>

</div>



<div class="main">

<h1>Reports Management</h1>

<div class="table-container">

<table>

<thead>
<tr>
<th>ID</th>
<th>Patient</th>
<th>Mobile</th>
<th>Test</th>
<th>Amount</th>
<th>Status</th>
<th>Upload Report</th>
<th>Download</th>
</tr>
</thead>

<tbody id="reportsTable">

</tbody>

</table>

</div>

</div>


<script>

/* NAVIGATION */

function openDashboard(){
window.location.href="/dashboard"
}

function openLeads(){
window.location.href="/leads"
}



/* LOAD REPORT DATA */

async function loadReports(){

try{

const res = await fetch("/api/reports")

const data = await res.json()

const table = document.getElementById("reportsTable")

table.innerHTML=""

data.forEach(r=>{

const row = document.createElement("tr")

row.innerHTML = `

<td>${r.id}</td>
<td>${r.name}</td>
<td>${r.mobile}</td>
<td>${r.test}</td>
<td>₹ ${r.amount}</td>

<td>
<select onchange="updateStatus(${r.id},this.value)">
<option value="Pending" ${r.report_status=="Pending"?"selected":""}>Pending</option>
<option value="Processing" ${r.report_status=="Processing"?"selected":""}>Processing</option>
<option value="Completed" ${r.report_status=="Completed"?"selected":""}>Completed</option>
</select>
</td>

<td>

<label class="upload-btn">
Upload
<input 
type="file"
accept="application/pdf"
style="display:none"
onchange="uploadReport(${r.id},this)"
>
</label>

<span class="file-name" style="margin-left:10px;font-size:13px;color:#444;">

${r.report_file 
? "📄 " + r.report_file.split(/[\\/]/).pop() 
: "<span style='color:#aaa'>No report</span>"}

</span>

</td>


<td>
${r.report_file && r.report_file !== "" 
? `<a class="download-btn" href="/${r.report_file}" download title="Download Report">📥 Download</a>` 
: `<span style="color:#999;">No File</span>`}
</td>

`

table.appendChild(row)

})

}catch(err){

console.error("Report load error",err)

}

}


/* UPLOAD REPORT */

async function uploadReport(id,input){

const file = input.files[0]

if(!file){
alert("Please select a PDF file")
return
}

if(file.type !== "application/pdf"){
alert("Only PDF files allowed")
input.value=""
return
}

const form = new FormData()

form.append("report",file)

try{

const res = await fetch("/api/upload-report/"+id,{
method:"POST",
body:form
})

const data = await res.json()

if(data.success){
console.log("Report uploaded successfully")
loadReports()
}else{
alert("Upload failed")
}

}catch(err){

console.error(err)
alert("Server error during upload")

}

}



/* UPDATE STATUS */

async function updateStatus(id,status){

try{

await fetch("/api/update-report-status",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
lead_id:id,
status:status
})

})

}catch(err){

console.error("Status update error",err)

}

}



/* PAGE LOAD */

loadReports()

setInterval(loadReports,3000);


</script>

</body>
</html>
